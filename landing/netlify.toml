###############################################################################
# SatQuest Landing — Netlify deployment config
###############################################################################

[build]
  command = "npm run build"
  publish = "dist"

# Pin Node 20 so Netlify uses the same version Vite expects
[build.environment]
  NODE_VERSION = "20"

# API proxy — must come BEFORE the SPA catch-all so Netlify matches it first.
# Netlify forwards /api/* to the backend server-side (no mixed-content in browser).
[[redirects]]
  from   = "/api/*"
  to     = "http://158.220.127.210:3000/api/:splat"
  status = 200
  force  = true

# SPA fallback — lets React Router handle all client-side routes.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

###############################################################################
# Security + privacy headers
###############################################################################

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

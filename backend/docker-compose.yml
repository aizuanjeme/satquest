services:
  postgres:
    image: postgres:16-alpine
    container_name: satquest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: satquest
      POSTGRES_PASSWORD: satquest
      POSTGRES_DB: satquest
    ports:
      - '5432:5432'
    volumes:
      - satquest_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U satquest -d satquest']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  satquest_pgdata:

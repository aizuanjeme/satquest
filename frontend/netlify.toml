###############################################################################
# SatQuest — Netlify deployment config
###############################################################################

[build]
  command   = "npm run build"
  publish   = "dist"

# Pin Node 20 so Netlify uses the same version Vite expects
[build.environment]
  NODE_VERSION = "20"

# SPA fallback — every non-asset path serves index.html so React Router / direct
# links to /map, /wallet, etc. don't 404 on a hard refresh.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

###############################################################################
# Security + privacy headers
###############################################################################

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

###############################################################################
# Caching — PWA needs careful cache rules
###############################################################################

# Service worker must NEVER be cached, or users get stuck on old versions
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/registerSW.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Manifest also short-cache so PWA name/icon changes take effect
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type  = "application/manifest+json"

# index.html: never cache — must always fetch the latest entry point
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Hashed Vite assets: cache forever (filename includes content hash)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Home-screen icons: 1 day cache (Netlify will revalidate on changes)
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/icon.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"
